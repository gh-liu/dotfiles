# Nord theme for tmux
# Color palette: https://www.nordtheme.com/

# Status bar - General
set -g status-interval 10
set -g status-justify left
set -g status-bg "#3B4252"
set -g status-fg "#4C566A"

# Status bar - Left (decorative bars)
set -g status-left '#[bg=#3B4252] #[bg=#4C566A] #[bg=#434C5E] '

# Status bar - Right (prefix indicator + informative + decorative bars)
set -g status-right '#{?client_prefix,#[fg=#BF616A#,bold]^F#[default] ,}#{?pane_synchronized,#[fg=#BF616A]*SYNC*#[default] ,}#{?SSH_CLIENT,#[fg=#81A1C1]SSH#[default] ,}#[fg=#88C0D0][#S] #[fg=#EBCB8B]%a %m-%d %H:%M #[bg=#434C5E] #[bg=#4C566A] #[bg=#3B4252] '

# Panes
set -g pane-border-status bottom
set -g pane-border-format " #{?pane_active,#[bold].#{pane_index}#{?window_zoomed_flag,/#{window_panes},}#[nobold],#{pane_index}} #{pane_current_command} #{pane_id}"
set -g pane-active-border-style "fg=#4C566A"
set -g pane-border-style "fg=#3B4252"

# Windows
setw -g window-status-format '#[fg=#81A1C1][#I] #{?window_zoomed_flag,⛶ ,}#W#{?window_last_flag,-,}#{?window_bell_flag,#,}#{?window_activity_flag,!,}#{?window_silence_flag,~,}#{?window_marked_flag,M,}'
setw -g window-status-current-format '#[fg=#A3BE8C,bold][#I] #{?window_zoomed_flag,⛶ ,}#W#{?window_bell_flag,#,}#{?window_activity_flag,!,}#{?window_silence_flag,~,}#{?window_marked_flag,M,}#[nobold]'
setw -g window-status-separator ' • '
setw -g window-status-bell-style 'none'
setw -g window-status-activity-style 'blink'
