# == Key Binding == {{{1
# don't suspend-client
unbind C-z

# == Sesssion == {{{2
# Change prefix to Ctrl-f
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Toggle status bar
bind-key G set status

# Use Enter instead of [ for copy mode
unbind [
# bind Enter copy-mode
# bind Escape copy-mode
bind v copy-mode
unbind p
bind p paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X copy-selection
# linux clipboard
if-shell '[[ $(uname -s) = Linux ]]' {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -i -sel clipboard'; 
    bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"; 
    bind C-v run 'tmux set-buffer "$(xclip -o -sel clipboard)"; tmux paste-buffer'
}
# # macos clipboard
# if-shell "uname | grep -q Darwin" {
#     bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'tmux save-buffer - | pbcopy'; \
#     bind C-c run 'tmux save-buffer - | pbcopy'; \
#     bind C-v run 'tmux set-buffer "$(pbpaste)"; tmux paste-buffer'
# }

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# kill Session
bind Q kill-session

# == Window == {{{2
# Create a new window
bind c new-window -c "#{pane_current_path}"

# Move window to left
bind -r \[ swap-window -t -1\; select-window -t -1
bind -r \] swap-window -t +1\; select-window -t +1

# kill window
bind X kill-window

# next or porvious window
bind C-n next-window
bind C-p previous-window

# == Pane == {{{2
# Fast pane spliting and switching 
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind \"
bind - split-window -v -c "#{pane_current_path}"

unbind q
bind p display-panes

bind -r h select-pane -L                   # h 等于向左移动光标
bind -r j select-pane -D                   # j 向下移动光标
bind -r k select-pane -U                   # k 向上移动光标
bind -r l select-pane -R                   # l 向右移动光标

# Resize-pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Kill Pane
bind x kill-pane

# Ctrl-f_n to toggle synchronize panes
bind n set-window-option synchronize-panes

# == Setting == {{{
# set-option -g status-position top

set -g focus-events on

#set mouse on
set -g mouse on

# Set history limit to something reasonable
set -g history-limit 102400

# Repeat time limit (ms)
set-option -g repeat-time 500

# Set vi-mode
setw -g mode-keys vi

# Index starts from 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Renumber windows when a window is closed
set-option -g renumber-windows on

# Set terminal to 256 color
set -g default-terminal "screen-256color"


# == Decoration (256-color) == {{{
set-option -g status-justify left
set-option -g status-left '#[bg=colour72] #[bg=colour237] #[bg=colour236] '
set-option -g status-left-length 16
set-option -g status-bg colour237
set-option -g status-right '#{?pane_synchronized, #[fg=colour196]*SYNC*#[default],}#[bg=colour236] #[bg=colour235]#[fg=colour185] #(date "+%a %b %d %H:%M") #[bg=colour236] #[bg=colour237] #[bg=colour72] '
set-option -g status-interval 60

set-option -g pane-border-status bottom
set-option -g pane-border-format " #{?pane_active,*,}#{pane_index} #{pane_current_command} "
set-option -g pane-active-border-style fg=colour245
set-option -g pane-border-style fg=colour243

set-window-option -g window-status-format '#[bg=colour238]#[fg=colour107] #I #[bg=colour239]#[fg=colour110] #[bg=colour240]#W#[bg=colour239]#[fg=colour195]#F#[bg=colour238] '
set-window-option -g window-status-current-format '#[bg=colour236]#[fg=colour215] #I #[bg=colour235]#[fg=colour167] #[bg=colour234]#W#[bg=colour235]#[fg=colour195]#F#[bg=colour236] '


# == fzf integration == {{{
# Select pane
bind-key 0 run-shell "tmux-fzf-panes || :" # : does Nothing but return a successful exit status.

# == Plugin == {{{
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'laktak/extrakto'

# https://github.com/tmux-plugins/tpm
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

